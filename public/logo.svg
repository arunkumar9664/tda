<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Tanya Dance Academy">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5B700"/>
      <stop offset="100%" stop-color="#E8A800"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B81F2F"/>
      <stop offset="100%" stop-color="#D72638"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="88"/>
    </clipPath>
  </defs>
  <!-- Outer mandala ring -->
  <circle cx="100" cy="100" r="96" stroke="url(#goldGrad)" stroke-width="2" opacity="0.9"/>
  <g stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.55">
    <circle cx="100" cy="100" r="88"/>
    <g transform="translate(100 100)">
      <line y1="-88" y2="-76" transform="rotate(0)"/>
      <line y1="-88" y2="-76" transform="rotate(30)"/>
      <line y1="-88" y2="-76" transform="rotate(60)"/>
      <line y1="-88" y2="-76" transform="rotate(90)"/>
      <line y1="-88" y2="-76" transform="rotate(120)"/>
      <line y1="-88" y2="-76" transform="rotate(150)"/>
      <line y1="-88" y2="-76" transform="rotate(180)"/>
      <line y1="-88" y2="-76" transform="rotate(210)"/>
      <line y1="-88" y2="-76" transform="rotate(240)"/>
      <line y1="-88" y2="-76" transform="rotate(270)"/>
      <line y1="-88" y2="-76" transform="rotate(300)"/>
      <line y1="-88" y2="-76" transform="rotate(330)"/>
    </g>
  </g>
  <!-- Background fill -->
  <circle cx="100" cy="100" r="82" fill="#0F0F0F"/>
  <circle cx="100" cy="100" r="82" fill="url(#redGrad)" opacity="0.15"/>
  <!-- Peacock feather accent (Rajasthan) -->
  <path d="M100 28 C108 42 118 48 128 52 C118 56 108 62 100 72 C92 62 82 56 72 52 C82 48 92 42 100 28Z" fill="url(#goldGrad)" opacity="0.85"/>
  <circle cx="100" cy="48" r="4" fill="#0F0F0F"/>
  <!-- Dancer silhouette -->
  <g clip-path="url(#circleClip)" fill="url(#goldGrad)">
    <ellipse cx="100" cy="168" rx="28" ry="6" opacity="0.25"/>
    <path d="M100 78 C94 78 90 84 90 92 C90 100 94 106 100 106 C106 106 110 100 110 92 C110 84 106 78 100 78Z"/>
    <path d="M100 106 L100 138" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M100 118 C85 125 72 140 68 158" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M100 118 C115 122 128 132 132 148" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M100 138 C88 148 82 162 80 172" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M100 138 C112 148 118 162 120 172" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M92 92 C78 88 70 96 66 108" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M108 92 C122 86 130 94 134 106" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>
